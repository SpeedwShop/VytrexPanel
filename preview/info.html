<!doctype html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vytrex · {{NAME}}</title>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js" defer></script>
<style>
:root{--bg:#0a0a0a;--card:#141414;--b:#2a2a2a;--tx:#f5f5f5;--mut:#9a9a9a;--acc:#fff;--ink:#000;--bad:#ff5c5c}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Tahoma,sans-serif}
body{background:radial-gradient(1200px 600px at 50% -10%,#1c1c1c,#0a0a0a);color:var(--tx);min-height:100vh;padding:20px}
.wrap{max-width:560px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.brand{display:flex;gap:10px;align-items:center}
.mark{width:40px;height:40px;border-radius:11px;background:var(--acc);color:var(--ink);display:grid;place-items:center;font-weight:900;font-size:20px}
.brand small{color:var(--mut);font-size:12px}
.chip{background:#1c1c1c;border:1px solid var(--b);color:var(--tx);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:12px}
.card{background:var(--card);border:1px solid var(--b);border-radius:18px;padding:22px;margin-bottom:16px;
  animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.ring-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center}
.ring{--p:0;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--acc) calc(var(--p)*1%),#262626 0);transition:--p 1s}
.ring .inner{width:120px;height:120px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}
.ring .pct{font-size:30px;font-weight:800}
.ring .lbl{font-size:11px;color:var(--mut)}
.meta{flex:1;min-width:180px}
.meta .r{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b);font-size:14px}
.meta .r b{font-weight:700}
.mut{color:var(--mut)}
h3{font-size:15px;margin-bottom:12px}
.link{background:#1c1c1c;border:1px solid var(--b);border-radius:11px;padding:11px;font-family:ui-monospace,monospace;
  font-size:11px;word-break:break-all;margin-bottom:8px;position:relative}
.copy{position:absolute;top:8px;inset-inline-end:8px;background:var(--acc);color:var(--ink);border:none;border-radius:7px;
  padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.subrow{display:flex;gap:8px;margin-top:6px}
.subrow input{flex:1;background:#1c1c1c;border:1px solid var(--b);color:var(--tx);border-radius:9px;padding:9px;font-size:12px}
.btn{background:var(--acc);color:var(--ink);border:none;border-radius:9px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:12px}
.qr{background:#fff;padding:14px;border-radius:14px;display:inline-block;margin-top:8px}
.center{text-align:center}
.toast{position:fixed;bottom:18px;inset-inline-start:50%;transform:translateX(-50%);background:#1c1c1c;border:1px solid var(--acc);
  padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.25s}
.toast.show{opacity:1;bottom:28px}
.expired{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="mark">V</span><div><b>Vytrex</b><br><small>{{NAME}}</small></div></div>
    <button class="chip" id="langBtn">EN</button>
  </div>

  <div class="card">
    <div class="ring-wrap">
      <div class="ring" id="ring"><div class="inner"><div><div class="pct" id="pct">0%</div><div class="lbl" data-i18n="used">مصرف</div></div></div></div>
      <div class="meta">
        <div class="r"><span class="mut" data-i18n="usage">حجم مصرفی</span><b>{{USED}} / {{TOTAL}}</b></div>
        <div class="r"><span class="mut" data-i18n="remaining">حجم باقی‌مانده</span><b>{{REMAIN}}</b></div>
        <div class="r"><span class="mut" data-i18n="expiry">انقضا</span><b class="{{EXP_CLASS}}">{{EXPIRY}}</b></div>
        <div class="r"><span class="mut" data-i18n="daysleft">روز باقی‌مانده</span><b>{{DAYS}}</b></div>
        <div class="r"><span class="mut" data-i18n="status">وضعیت</span><b>{{STATUS}}</b></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="sub">لینک اشتراک</h3>
    <div class="subrow"><input id="suburl" value="{{SUBURL}}" readonly>
      <button class="btn" onclick="cp(document.getElementById('suburl').value)" data-i18n="copy">کپی</button></div>
    <div class="center"><div class="qr" id="qr"></div></div>
  </div>

  <div class="card">
    <h3 data-i18n="configs">کانفیگ‌ها</h3>
    <div id="links"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DATA = {{LINKS_JSON}};
const SUB = "{{SUBURL}}";
const PCT = {{PERCENT}};
let LANG = "fa";
const T = {
  fa:{used:"مصرف",usage:"حجم مصرفی",remaining:"حجم باقی‌مانده",expiry:"انقضا",daysleft:"روز باقی‌مانده",status:"وضعیت",sub:"لینک اشتراک",copy:"کپی",configs:"کانفیگ‌ها",copied:"کپی شد"},
  en:{used:"Used",usage:"Traffic used",remaining:"Remaining",expiry:"Expiry",daysleft:"Days left",status:"Status",sub:"Subscription",copy:"Copy",configs:"Configs",copied:"Copied"}
};
function t(k){return (T[LANG]&&T[LANG][k])||k;}
function applyLang(){document.documentElement.dir=LANG==="fa"?"rtl":"ltr";
  document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));
  document.getElementById("langBtn").textContent=LANG==="fa"?"EN":"FA";}
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1500);}
function cp(x){navigator.clipboard.writeText(x).then(()=>toast(t("copied")));}
function render(){
  const box=document.getElementById("links"); box.innerHTML="";
  DATA.forEach((l,i)=>{ const d=document.createElement("div"); d.className="link";
    d.innerHTML='<button class="copy">'+t("copy")+'</button>'+l;
    d.querySelector(".copy").onclick=()=>cp(l); box.appendChild(d); });
}
document.getElementById("langBtn").onclick=()=>{LANG=LANG==="fa"?"en":"fa";applyLang();};
window.addEventListener("DOMContentLoaded",()=>{
  applyLang(); render();
  document.getElementById("pct").textContent=PCT+"%";
  const r=document.getElementById("ring"); requestAnimationFrame(()=>r.style.setProperty("--p",PCT));
  const first=DATA[0]||SUB;
  const q=document.getElementById("qr");
  if(window.QRCode) new QRCode(q,{text:first,width:170,height:170});
  else q.innerHTML='<img style="width:170px" src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data='+encodeURIComponent(first)+'">';
});
</script>
</body>
</html>
