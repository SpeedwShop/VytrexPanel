<!doctype html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Vytrex · {{NAME}}</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css">
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js" defer></script>
<style>
:root{--bg:#0a0a0a;--card:#141414;--b:#2a2a2a;--tx:#f5f5f5;--mut:#9a9a9a;--acc:#fff;--ink:#000;--bad:#ff5c5c;--ok:#3ad07a;--warn:#f5c451}
*{box-sizing:border-box;margin:0;padding:0;font-family:Vazirmatn,system-ui,Tahoma,sans-serif}
body{background:radial-gradient(1200px 600px at 50% -10%,#1c1c1c,#0a0a0a);color:var(--tx);min-height:100vh;padding:20px 16px;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:540px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.brand{display:flex;gap:10px;align-items:center}
.mark{width:42px;height:42px;border-radius:12px;background:var(--acc);color:var(--ink);display:grid;place-items:center;
  font-weight:900;font-size:22px;box-shadow:0 10px 20px rgba(0,0,0,.4)}
.brand b{font-size:16px;letter-spacing:.5px}
.brand small{color:var(--mut);font-size:12px}
.chip{background:#1c1c1c;border:1px solid var(--b);color:var(--tx);border-radius:10px;padding:8px 12px;cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:700}
.card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:24px;margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);animation:rise .5s cubic-bezier(.2,.8,.3,1) both}
.card:nth-child(2){animation-delay:.05s} .card:nth-child(3){animation-delay:.1s}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.ring-wrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center}
.ring{--p:0;--c:var(--acc);width:160px;height:160px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--c) calc(var(--p)*1%),#262626 0);transition:--p 1s,--c 1s}
.ring .inner{width:126px;height:126px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}
.ring .pct{font-size:32px;font-weight:800}
.ring .lbl{font-size:12px;color:var(--mut)}
.meta{flex:1;min-width:200px}
.meta .r{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b);font-size:14px}
.meta .r:last-child{border-bottom:none;padding-bottom:0}
.meta .r b{font-weight:700}
.mut{color:var(--mut)}
h3{font-size:15px;margin-bottom:14px;font-weight:800}
.link{background:#1c1c1c;border:1px solid var(--b);border-radius:12px;padding:12px 14px;font-family:ui-monospace,monospace;
  font-size:12px;word-break:break-all;margin-bottom:10px;position:relative}
.copy{position:absolute;top:10px;inset-inline-end:10px;background:var(--acc);color:var(--ink);border:none;border-radius:8px;
  padding:5px 10px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit;transition:.15s}
.copy:active{transform:scale(.92)}
.subrow{display:flex;gap:8px;margin-top:6px}
.subrow input{flex:1;background:#1c1c1c;border:1px solid var(--b);color:var(--tx);border-radius:11px;padding:10px 12px;font-size:13px;font-family:inherit}
.subrow input:focus{outline:none;border-color:var(--acc)}
.btn{background:var(--acc);color:var(--ink);border:none;border-radius:11px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s}
.btn:active{transform:scale(.95)}
.qr{background:#fff;padding:16px;border-radius:16px;display:inline-block;margin-top:10px;box-shadow:0 5px 15px rgba(0,0,0,.2)}
.center{text-align:center}
.toast{position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(-50%);background:#1c1c1c;border:1px solid var(--acc);
  padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 10px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1;bottom:30px}
.expired{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="mark">V</span><div><b>Vytrex</b><br><small>{{NAME}}</small></div></div>
    <button class="chip" id="langBtn">EN</button>
  </div>

  <div class="card">
    <div class="ring-wrap">
      <div class="ring" id="ring"><div class="inner"><div><div class="pct" id="pct">0%</div><div class="lbl" data-i18n="used">مصرف</div></div></div></div>
      <div class="meta">
        <div class="r"><span class="mut" data-i18n="usage">حجم مصرفی</span><b>{{USED}} / {{TOTAL}}</b></div>
        <div class="r"><span class="mut" data-i18n="remaining">حجم باقی‌مانده</span><b>{{REMAIN}}</b></div>
        <div class="r"><span class="mut" data-i18n="expiry">انقضا</span><b class="{{EXP_CLASS}}">{{EXPIRY}}</b></div>
        <div class="r"><span class="mut" data-i18n="daysleft">روز باقی‌مانده</span><b>{{DAYS}}</b></div>
        <div class="r"><span class="mut" data-i18n="status">وضعیت</span><b>{{STATUS}}</b></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="sub">لینک اشتراک (Subscription)</h3>
    <div class="subrow"><input id="suburl" value="{{SUBURL}}" readonly onclick="this.select()">
      <button class="btn" onclick="cp(document.getElementById('suburl').value)" data-i18n="copy">کپی</button></div>
    <div class="center"><div class="qr" id="qr"></div></div>
  </div>

  <div class="card">
    <h3 data-i18n="configs">کانفیگ‌ها</h3>
    <div id="links"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DATA = {{LINKS_JSON}};
const SUB = "{{SUBURL}}";
const PCT = {{PERCENT}};
let LANG = "fa";
const T = {
  fa:{used:"مصرف",usage:"حجم مصرفی",remaining:"حجم باقی‌مانده",expiry:"انقضا",daysleft:"روز باقی‌مانده",status:"وضعیت",sub:"لینک اشتراک",copy:"کپی",configs:"کانفیگ‌ها",copied:"کپی شد"},
  en:{used:"Used",usage:"Traffic used",remaining:"Remaining",expiry:"Expiry",daysleft:"Days left",status:"Status",sub:"Subscription",copy:"Copy",configs:"Configs",copied:"Copied"}
};
function t(k){return (T[LANG]&&T[LANG][k])||k;}
function applyLang(){document.documentElement.dir=LANG==="fa"?"rtl":"ltr";
  document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));
  document.getElementById("langBtn").textContent=LANG==="fa"?"EN":"FA";}
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1700);}
function cp(x){navigator.clipboard.writeText(x).then(()=>toast(t("copied")));}
function render(){
  const box=document.getElementById("links"); box.innerHTML="";
  DATA.forEach((l,i)=>{ const d=document.createElement("div"); d.className="link";
    d.innerHTML='<button class="copy">'+t("copy")+'</button>'+l;
    d.querySelector(".copy").onclick=()=>cp(l); box.appendChild(d); });
}
document.getElementById("langBtn").onclick=()=>{LANG=LANG==="fa"?"en":"fa";applyLang();};
window.addEventListener("DOMContentLoaded",()=>{
  applyLang(); render();
  document.getElementById("pct").textContent=PCT+"%";
  const r=document.getElementById("ring"); 
  const color = PCT > 90 ? "var(--bad)" : PCT > 75 ? "var(--warn)" : "var(--ok)";
  requestAnimationFrame(()=>{
    r.style.setProperty("--p",PCT);
    r.style.setProperty("--c",color);
    document.getElementById("pct").style.color = color;
  });
  const first=DATA[0]||SUB;
  const q=document.getElementById("qr");
  if(window.QRCode) new QRCode(q,{text:first,width:180,height:180});
  else q.innerHTML='<img style="width:180px;border-radius:8px" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(first)+'">';
});
</script>
</body>
</html>
